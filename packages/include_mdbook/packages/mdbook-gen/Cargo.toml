[package]
name = "mdbook-gen"
version = "0.0.0"
edition = "2021"

[dependencies]
arborium = { version = "2.16.0", default-features = false, features = [
    "lang-bash",
    "lang-batch",
    "lang-css",
    "lang-dockerfile",
    "lang-html",
    "lang-javascript",
    "lang-json",
    "lang-lua",
    "lang-powershell",
    "lang-rust",
    "lang-toml",
    "lang-tsx",
    "lang-yaml",
] }
arborium-theme = "2.16.0"
proc-macro2 = { version = "1.0" }
quote = "1.0"
syn = { workspace = true }
mdbook-shared = { path = "../mdbook-shared" }
anyhow = "1.0.71"
serde = { version = "1.0.163", features = ["derive"] }
serde_json = "1.0.96"
macro_state = "0.2.0"
convert_case = "0.6.0"
postcard = { version = "1.0.4", features = ["use-std"] }
pulldown-cmark = "0.13.0"
pulldown-cmark-to-cmark = "21.0.0"
prettyplease = "0.2.20"

dioxus-rsx = { workspace = true }
dioxus-autofmt = { workspace = true }

[dev-dependencies]
pretty_assertions = "1.3.0"

[features]
default = ["manganis"]
manganis = []
